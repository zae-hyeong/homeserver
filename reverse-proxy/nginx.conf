events {}

http {
    # WebSocket 지원을 위한 맵핑 설정
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 1. HTTP 통합 바이패스 (SSL 없이 개발/로컬 테스트용)
    server {
        listen 80;
        server_name zaehyeong.cloud *.zaehyeong.cloud localhost 127.0.0.1;

        # Let's Encrypt HTTP Challenge 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # 모든 HTTP 요청을 Node.js 동적 프록시 서버로 전달
            proxy_pass http://app_service:3000;
            
            # 헤더 정보 유지 및 포워딩
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 지원
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 타임아웃 조정 (WebSocket이 유지되도록 긴 시간 설정)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # 2. HTTPS 통합 바이패스 (인증서 발급 완료 시 아래 주석을 해제하여 사용하세요)
    # server {
    #     listen 443 ssl;
    #     server_name zaehyeong.cloud *.zaehyeong.cloud;
    # 
    #     ssl_certificate /etc/letsencrypt/live/zaehyeong.cloud/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/zaehyeong.cloud/privkey.pem;
    # 
    #     location / {
    #         proxy_pass http://app_service:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #         proxy_read_timeout 86400s;
    #         proxy_send_timeout 86400s;
    #     }
    # }
}