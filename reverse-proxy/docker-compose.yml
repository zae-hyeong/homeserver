version: '3.8'

services:
  reverse-proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - proxy_net
    depends_on:
      - app_service
      
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 12시간마다 갱신 시도
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - proxy_net

  app_service:
    build: ./app
    restart: unless-stopped
    volumes:
      - ./app/routes.json:/app/routes.json
    networks:
      - proxy_net
      - homeserver-net

networks:
  proxy_net:
    driver: bridge
  homeserver-net:
    external: true