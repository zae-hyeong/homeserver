version: '3.8'

services:
  postgres:
    image: postgres:16 # 호환성이 더 높은 데비안 기반 이미지로 변경
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-homeserver}
    volumes:
      # Mac 호스트의 현재 폴더 내부(./pgdata)에 데이터를 저장하도록 변경하여 백업 용이성 확보
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - homeserver-net

networks:
  # 다른 서비스 컨테이너들과의 통신을 위해 외부 공유 네트워크로 변경
  homeserver-net:
    external: true

