name: Deploy DB Config to Home Server

on:
  push:
    branches:
      - main
    paths:
      - 'DB/**' # DB 폴더 하위 변경 시 실행

jobs:
  print-info:
    runs-on: ubuntu-latest
    steps:
      - name: Print DB changes detected
        run: echo "DB 설정 변경이 감지되었습니다. 원격 배포는 주석 처리되어 대기 중입니다."

