name: Deploy Reverse Proxy to Home Server

on:
  push:
    branches:
      - main
    paths:
      - 'reverse-proxy/**' # reverse-proxy 폴더 하위 변경 시 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Apple Silicon(M1/M2/M3/M4) 맥미니 환경에 맞게 ARM64 아키텍처 빌드 준비
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 이미지 빌드 및 푸시 (AMD64와 ARM64 멀티 아키텍처 지원 빌드)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./reverse-proxy/app
          file: ./reverse-proxy/app/Dockerfile
          platforms: linux/amd64,linux/arm64 # 맥미니(ARM)와 일반 리눅스 모두 지원
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/homeserver-reverse-proxy:latest

